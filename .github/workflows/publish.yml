name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'change/**'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Perform a dry-run publish (no actual publish)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish (dry-run)
        if: inputs.dry-run == 'true'
        run: npx beachball publish --no-push --no-publish

      - name: Publish
        if: inputs.dry-run != 'true'
        run: npx beachball publish
        env:
          NPM_CONFIG_PROVENANCE: 'true'
