name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'change/**'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Perform a dry-run publish (no actual publish)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish (dry-run)
        if: inputs.dry-run == 'true'
        run: npx beachball publish --no-push --no-publish

      - name: Get npm OIDC token
        if: inputs.dry-run != 'true'
        run: |
          TOKEN=$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" \
            | jq -r '.value')
          echo "NODE_AUTH_TOKEN=${TOKEN}" >> "$GITHUB_ENV"

      - name: Publish
        if: inputs.dry-run != 'true'
        run: npx beachball publish
        env:
          NPM_CONFIG_PROVENANCE: 'true'
